# Production overlay — adds the Caddy reverse proxy with automatic HTTPS.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Only Caddy publishes ports (80/443). postgres, redis, api, and web remain on
# the internal Docker network and are not reachable from the public internet.
services:
  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
