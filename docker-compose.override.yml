# Auto-loaded by `docker compose up` for LOCAL development only.
# Publishes service ports to the host so you can hit them directly. Do NOT use
# this on the VPS — production uses docker-compose.prod.yml (Caddy) instead and
# this file is simply not referenced there.
services:
  postgres:
    ports:
      - '5432:5432'
  redis:
    ports:
      - '6379:6379'
  api:
    ports:
      - '4000:4000'
  web:
    ports:
      - '3000:3000'
